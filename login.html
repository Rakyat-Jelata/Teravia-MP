<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Akun - TERAVIA</title>
    <link rel="stylesheet" href="assets/css/reset.css">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/utilities.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body data-page="login">
    <header class="header">
    <div data-navbar></div>
    </header>

    <section class="section">
        <div class="container" style="max-width: 480px; margin-top: 60px;">
            <div class="card auth-card">
                <div class="text-center margin-bottom-24">
                    <a href="index.html" class="logo" style="display: inline-block;">
                        <img src="assets/img/logo.png" alt="TERAVIA Logo">
                    </a>
                    <h3>Selamat Datang Kembali</h3>
                    <p>Silakan masuk menggunakan akun Teravia Anda</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Alamat Email</label>
                        <input type="email" id="email" class="form-control" placeholder="nama@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Kata Sandi</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="auth-options margin-bottom-24">
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" style="width: auto; min-height: auto;"> Ingatkan saya
                        </label>
                        <a href="#forgot" style="font-size: var(--fs-14); color: var(--color-primary);">Lupa Kata Sandi?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full">Masuk Sekarang</button>
                </form>

                <div class="divider"></div>

                <div class="text-center">
                    <p>Belum mempunyai akun? <a href="register.html" style="color: var(--color-primary); font-weight: var(--font-semibold);">Daftar di sini</a></p>
                </div>
            </div>
        </div>
    </section>
    <div data-footer></div>
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
