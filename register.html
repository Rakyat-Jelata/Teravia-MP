<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun - TERAVIA</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/pages/auth.css">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f4f7f6;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      width: 100%;
      max-width: 450px;
      padding: 2.5rem;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="text-center mb-4">
      <a href="index.html" class="text-decoration-none">
        <h2 class="fw-bold text-primary mb-1">TERAVIA</h2>
      </a>
      <p class="text-muted">Buat akun baru Anda</p>
    </div>

    <form id="register-form">
      <div class="mb-3">
        <label for="fullname" class="form-label">Nama Lengkap</label>
        <input type="text" id="fullname" class="form-control" placeholder="Nama lengkap Anda" required>
      </div>

      <div class="mb-3">
        <div class="d-flex justify-content-between mb-1">
          <label for="role" class="form-label mb-0">Mendaftar Sebagai</label>
        </div>
        <select id="role" class="form-select" required>
          <option value="buyer">Pencari Properti (Buyer)</option>
          <option value="owner">Pemilik Properti (Owner)</option>
          <option value="broker">Agen / Broker</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Alamat Email</label>
        <input type="email" id="email" class="form-control" placeholder="nama@email.com" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Kata Sandi</label>
        <input type="password" id="password" class="form-control" placeholder="Minimal 6 karakter" required>
      </div>

      <button type="submit" id="btn-register" class="btn btn-primary w-100 py-2 mt-2">Daftar Akun</button>
    </form>

    <div class="text-center mt-4">
      <p class="text-muted small mb-0">Sudah memiliki akun? <a href="login.html" class="text-decoration-none">Masuk</a></p>
    </div>
  </div>

  <div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index: 11"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase.js"></script>
  
  <script src="assets/js/components/toast.js"></script>
  <script src="assets/js/services/auth-service.js"></script>
  <script src="assets/js/auth/register.js"></script>
</body>
</html>
