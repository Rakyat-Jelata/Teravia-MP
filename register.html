<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Baru - TERAVIA</title>
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/utilities.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body data-page="register">
    <header class="header">
    <div data-navbar></div>
    </header>

    <section class="section">
        <div class="container" style="max-width: 520px; margin-top: 40px;">
            <div class="card auth-card">
                <div class="text-center margin-bottom-24">
                    <a href="index.html" class="logo" style="display: inline-block;">
                        <img src="assets/img/logo.png" alt="TERAVIA Logo">
                    </a>
                    <h3>Buat Akun Teravia</h3>
                    <p>Mulai kelola dan temukan aset properti terbaik Anda</p>
                </div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="fullName">Nama Lengkap</label>
                        <input type="text" id="fullName" class="form-control" placeholder="Nama lengkap sesuai KTP" required>
                    </div>

                    <div class="form-group">
                        <label for="regEmail">Alamat Email</label>
                        <input type="email" id="regEmail" class="form-control" placeholder="nama@email.com" required>
                    </div>

                    <div class="form-group">
                        <label>Daftar Sebagai</label>
                        <div class="role-selector" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 8px;">
                            <label class="card" style="padding: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="radio" name="userRole" value="buyer" checked style="width: auto; min-height: auto;"> Pencari Properti
                            </label>
                            <label class="card" style="padding: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="radio" name="userRole" value="owner" style="width: auto; min-height: auto;"> Pemilik Properti / Agen
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="regPassword">Kata Sandi Baru</label>
                        <input type="password" id="regPassword" class="form-control" placeholder="Minimal 8 karakter" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Daftar Akun</button>
                </form>

                <div class="divider"></div>

                <div class="text-center">
                    <p>Sudah memiliki akun? <a href="login.html" style="color: var(--color-primary); font-weight: var(--font-semibold);">Masuk Ke Akun</a></p>
                </div>
            </div>
        </div>
    </section>
    <div data-footer></div>

    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
